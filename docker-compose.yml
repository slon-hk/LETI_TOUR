services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leti_tour
      POSTGRES_USER: leti
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leti -d leti_tour"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [leti_net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [leti_net]
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: leti_backend
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [leti_net]
    restart: unless-stopped

  frontend:
    build: ./frontend/gg
    container_name: leti_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    networks: [leti_net]
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: leti_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Auto-renew every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_certs:
  certbot_www:

networks:
  leti_net:
    driver: bridge
